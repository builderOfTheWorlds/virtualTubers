name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `avatar --persona ghost`
        2. Send event with `avatar-bridge speak "hello"`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Ubuntu / Debian
        - Fedora / RHEL
        - Arch Linux
        - macOS
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: dropdown
    id: tts
    attributes:
      label: TTS engine
      options:
        - Kokoro (local)
        - ElevenLabs (cloud)
        - Piper (fallback)
        - None (animation-only)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Run with `-v` for verbose output.
      render: shell
