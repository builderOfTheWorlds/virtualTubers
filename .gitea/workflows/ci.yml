name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: host
    steps:
      - uses: actions/checkout@v4
      - name: Set up virtualenv
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install -r services/message-api/requirements.txt
          .venv/bin/pip install -r services/log-shipper/requirements.txt
          .venv/bin/pip install -r services/message-logger/requirements.txt
      - name: Run tests
        run: .venv/bin/pytest -m "not slow"

  build:
    needs: test
    runs-on: host
    steps:
      - uses: actions/checkout@v4
      - name: Build images
        run: ./install.sh
