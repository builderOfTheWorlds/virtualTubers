services:

  worker-coder:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_STREAM_KEY:-coder}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 99
      WORKER_ID: coder
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/coder.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  # ── A/B coding-backend coders — same task, three different tools writing
  # real code into their own workspace volumes (docs/coding_backend.md).
  worker-coder-native:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_NATIVE_STREAM_KEY:-coder-native}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 102
      WORKER_ID: coder-native
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      GIT_SERVER_URL: ${GIT_SERVER_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/coder-native.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo-native:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-coder-opencode:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_OPENCODE_STREAM_KEY:-coder-opencode}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 103
      WORKER_ID: coder-opencode
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      GIT_SERVER_URL: ${GIT_SERVER_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/coder-opencode.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo-opencode:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-coder-aider:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_AIDER_STREAM_KEY:-coder-aider}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 104
      WORKER_ID: coder-aider
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      GIT_SERVER_URL: ${GIT_SERVER_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/coder-aider.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo-aider:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-manager:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${MANAGER_STREAM_KEY:-manager}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 100
      WORKER_ID: manager
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/manager.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-tester:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${TESTER_STREAM_KEY:-tester}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 101
      WORKER_ID: tester
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/tester.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      # Read-only view of every coder's workspace, at the conventional
      # /data/repos/<coder_id> paths agent.py resolves (test_runner copies
      # to a tmpdir before running pytest — these must stay :ro).
      - repo:/data/repos/coder:ro
      - repo-native:/data/repos/coder-native:ro
      - repo-opencode:/data/repos/coder-opencode:ro
      - repo-aider:/data/repos/coder-aider:ro
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  message-logger:
    image: virtualtubers-message-logger:latest
    pull_policy: never
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      KAFKA_GROUP_ID: vtuber-logger
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    restart: unless-stopped

  message-api:
    image: virtualtubers-message-api:latest
    pull_policy: never
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    ports:
      - "8090:8000"
    restart: unless-stopped
    depends_on:
      - redis

  log-shipper:
    image: virtualtubers-log-shipper:latest
    pull_policy: never
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      # Read-only Docker socket access is required to discover and follow
      # sibling containers' logs; there's no finer-grained way to scope this.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # Shared world state
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # Local RTMP server — workers stream here, preview in VLC
  rtmp-preview:
    image: tiangolo/nginx-rtmp
    ports:
      - "1935:1935"
      - "8088:80"
    restart: unless-stopped

volumes:
  world-state:
  repo:
  repo-native:
  repo-opencode:
  repo-aider:
  redis-data:
