services:

  worker-coder:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_STREAM_KEY:-coder}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 99
      WORKER_ID: coder
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
    volumes:
      - /opt/virtualTubers/config/workers/coder.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview

  worker-manager:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${MANAGER_STREAM_KEY:-manager}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 100
      WORKER_ID: manager
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
    volumes:
      - /opt/virtualTubers/config/workers/manager.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview

  worker-tester:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${TESTER_STREAM_KEY:-tester}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 101
      WORKER_ID: tester
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
    volumes:
      - /opt/virtualTubers/config/workers/tester.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo:/data/repo:ro
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview

  message-logger:
    build:
      context: .
      dockerfile: services/message-logger/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      KAFKA_GROUP_ID: vtuber-logger
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mafober}
      POSTGRES_USER: ${POSTGRES_USER:-mafober}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    restart: unless-stopped

  message-api:
    build:
      context: .
      dockerfile: services/message-api/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
    ports:
      - "8090:8000"
    restart: unless-stopped

  log-shipper:
    build:
      context: .
      dockerfile: services/log-shipper/Dockerfile
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-mafober}
      POSTGRES_USER: ${POSTGRES_USER:-mafober}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      # Read-only Docker socket access is required to discover and follow
      # sibling containers' logs; there's no finer-grained way to scope this.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # Shared world state
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # Local RTMP server — workers stream here, preview in VLC
  rtmp-preview:
    image: tiangolo/nginx-rtmp
    ports:
      - "1935:1935"
      - "8088:80"
    restart: unless-stopped

volumes:
  world-state:
  repo:
  redis-data:
