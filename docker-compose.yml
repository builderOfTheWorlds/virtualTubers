services:

  worker-coder:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_STREAM_KEY:-coder}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 99
      WORKER_ID: coder
      # Set CODER_LAYOUT_PRESET=replay in the stack env to switch this
      # worker into Rerun Theater mode (docs/replay_pane.md) — env-only
      # change, no rebuild.
      LAYOUT_PRESET: ${CODER_LAYOUT_PRESET:-coder}
      # Swap the avatar renderer without a config edit or rebuild — e.g.
      # "ascii_avatar" (docs/avatar_providers.md). Unset keeps the worker
      # config's own avatar.provider (defaults to "builtin").
      AVATAR_PROVIDER: ${CODER_AVATAR_PROVIDER:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # narration reuse cache (app/narration_store.py)
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - /opt/virtualTubers/config/workers/coder.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo:/data/repo
      # "Rerun Theater" episode library (docs/replay_pane.md) — parsed,
      # redacted session scripts synced onto the host; :ro because replays
      # only ever read them.
      - /opt/virtualTubers/replays:/data/replays:ro
      # Piper .onnx voice models for spoken replay narration
      # (docs/tts_client.md; download with scripts/download_voices.py)
      - /opt/virtualTubers/voices:/data/voices:ro
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  # ── A/B coding-backend coders — same task, three different tools writing
  # real code into their own workspace volumes (docs/coding_backend.md).
  worker-coder-native:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_NATIVE_STREAM_KEY:-coder-native}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 102
      WORKER_ID: coder-native
      AVATAR_PROVIDER: ${CODER_NATIVE_AVATAR_PROVIDER:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      GIT_SERVER_URL: ${GIT_SERVER_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/coder-native.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo-native:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-coder-opencode:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_OPENCODE_STREAM_KEY:-coder-opencode}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 103
      WORKER_ID: coder-opencode
      AVATAR_PROVIDER: ${CODER_OPENCODE_AVATAR_PROVIDER:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      GIT_SERVER_URL: ${GIT_SERVER_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/coder-opencode.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo-opencode:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-coder-aider:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${CODER_AIDER_STREAM_KEY:-coder-aider}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 104
      WORKER_ID: coder-aider
      AVATAR_PROVIDER: ${CODER_AIDER_AVATAR_PROVIDER:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      GIT_SERVER_URL: ${GIT_SERVER_URL:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    volumes:
      - /opt/virtualTubers/config/workers/coder-aider.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - repo-aider:/data/repo
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-manager:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${MANAGER_STREAM_KEY:-manager}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 100
      WORKER_ID: manager
      LAYOUT_PRESET: ${MANAGER_LAYOUT_PRESET:-manager}
      AVATAR_PROVIDER: ${MANAGER_AVATAR_PROVIDER:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # narration reuse cache (app/narration_store.py)
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - /opt/virtualTubers/config/workers/manager.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - /opt/virtualTubers/replays:/data/replays:ro
      - /opt/virtualTubers/voices:/data/voices:ro
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  worker-tester:
    image: vtube-worker:latest
    pull_policy: never
    environment:
      CONFIG_PATH: /config/worker.yaml
      STREAM_RTMP_URL: ${STREAM_RTMP_URL:-rtmp://rtmp-preview:1935/live}
      STREAM_KEY: ${TESTER_STREAM_KEY:-tester}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host-gateway:11434}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISPLAY_NUM: 101
      WORKER_ID: tester
      LAYOUT_PRESET: ${TESTER_LAYOUT_PRESET:-tester}
      AVATAR_PROVIDER: ${TESTER_AVATAR_PROVIDER:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # narration reuse cache (app/narration_store.py)
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - /opt/virtualTubers/config/workers/tester.yaml:/config/worker.yaml:ro
      - world-state:/data/world-state
      - /opt/virtualTubers/replays:/data/replays:ro
      - /opt/virtualTubers/voices:/data/voices:ro
      # Read-only view of every coder's workspace, at the conventional
      # /data/repos/<coder_id> paths agent.py resolves (test_runner copies
      # to a tmpdir before running pytest — these must stay :ro).
      - repo:/data/repos/coder:ro
      - repo-native:/data/repos/coder-native:ro
      - repo-opencode:/data/repos/coder-opencode:ro
      - repo-aider:/data/repos/coder-aider:ro
    ipc: host
    shm_size: 256mb
    restart: unless-stopped
    depends_on:
      - rtmp-preview
      - redis

  message-logger:
    image: virtualtubers-message-logger:latest
    pull_policy: never
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      KAFKA_GROUP_ID: vtuber-logger
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    restart: unless-stopped
    depends_on:
      - redis

  message-api:
    image: virtualtubers-message-api:latest
    pull_policy: never
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-192.168.1.120:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-vtuber.messages}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Backs POST /logs/prune (docs/log_shipper.md) — deletes container_logs
      # rows in a caller-specified time range.
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "8090:8000"
    restart: unless-stopped
    depends_on:
      - redis

  # Watches each worker's Twitch chat (anonymous IRC — no Twitch credentials
  # needed) and announces arriving viewers as `viewer_joined` messages via
  # message-api, so workers greet them on stream (docs/twitch_presence.md).
  # Idles with a periodic log line until TWITCH_CHANNEL_MAP is set.
  twitch-presence:
    image: virtualtubers-twitch-presence:latest
    pull_policy: never
    environment:
      # channel:worker_id pairs, e.g. "mycoderchannel:coder,mymgrchannel:manager"
      TWITCH_CHANNEL_MAP: ${TWITCH_CHANNEL_MAP:-}
      MESSAGE_API_URL: http://message-api:8000/messages
      # Seconds before the same viewer in the same channel is greeted again
      PRESENCE_COOLDOWN_S: ${PRESENCE_COOLDOWN_S:-3600}
      # Extra chat bots to ignore (extends the built-in list)
      PRESENCE_IGNORE_USERS: ${PRESENCE_IGNORE_USERS:-}
    restart: unless-stopped
    depends_on:
      - message-api

  log-shipper:
    image: virtualtubers-log-shipper:latest
    pull_policy: never
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-192.168.1.120}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-virtualtubers}
      POSTGRES_USER: ${POSTGRES_USER:-virtualtubers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      # container_logs rows older than this are purged hourly (docs/log_shipper.md)
      RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
    volumes:
      # Read-only Docker socket access is required to discover and follow
      # sibling containers' logs; there's no finer-grained way to scope this.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # Shared world state
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # Local RTMP server — workers stream here, preview in VLC
  rtmp-preview:
    image: tiangolo/nginx-rtmp
    ports:
      - "1935:1935"
      - "8088:80"
    restart: unless-stopped

volumes:
  world-state:
  repo:
  repo-native:
  repo-opencode:
  repo-aider:
  redis-data:
