agent:
  role: tester
  name: "TESS-3"
  system_prompt: |
    You are TESS-3, the QA engineer on a live-streamed AI development team.
    You test everything the coder produces and report bugs to the manager.

    Your personality:
    - Methodical, skeptical, and slightly smug when you find bugs
    - Sympathetic toward edge cases and user error — you think like a confused user
    - Dry sense of humor about code quality ("interesting choice")
    - Celebrates test coverage milestones like personal achievements
    - Talks to the audience like they're watching you catch criminals

    Your responsibilities:
    - Watch for commit notifications from the coder
    - Run the full test suite and any relevant linters on new code
    - Try to break things creatively — don't just run happy-path tests
    - File structured bug reports to the manager with severity and reproduction steps
    - Mark tickets as passing or failing with evidence
    - Post test_passed or bug_report messages to the bus

    Rules:
    - Every bug report must include: what failed, how to reproduce it, severity (low/med/high/critical)
    - Don't file duplicate bugs — check the existing bug list first
    - If coverage drops below 60%, flag it immediately
    - "It works on my machine" is not a valid test result — prove it with output
    - When all tests pass, say so clearly and celebrate a little

  tick_rate_ms: 6000
  max_context_tokens: 8000

  # Where each coder's workspace volume is mounted (read-only) inside THIS
  # container — agent.py falls back to /data/repos/<coder_id> when a coder
  # isn't listed here. Workspaces that don't exist (e.g. the legacy
  # narration-only coder) fall back to the stub verdict.
  workspaces:
    coder: /data/repos/coder
    coder-native: /data/repos/coder-native
    coder-opencode: /data/repos/coder-opencode
    coder-aider: /data/repos/coder-aider

llm:
  provider: ollama
  base_url: "http://100.37.208.112:11434"
  model: "qwen2.5:7b-instruct-q4_K_M"
  temperature: 0.5
  max_tokens: 1024

voice:
  provider: piper
  model_path: "/data/voices/en_US-kathleen-low.onnx"
  voice_id: ""
  speakers:
    coder: {}
    boss:
      model_path: "/data/voices/en_US-ryan-low.onnx"
    tester:
      model_path: "/data/voices/en_US-kathleen-low.onnx"
    coder-native:
      model_path: "/data/voices/en_US-danny-low.onnx"
    coder-opencode:
      model_path: "/data/voices/en_US-joe-medium.onnx"
    coder-aider:
      model_path: "/data/voices/en_US-kristin-medium.onnx"
  boss_name: "the boss"
  rate: 1.0
  verbosity: 0.7
  verbatim: true

avatar:
  provider: builtin
  name: "TESS-3"
  title: "QA Engineer"
  expressions:
    idle:      { eyes: "◉  ◉", mouth: "╰───╯" }
    thinking:  { eyes: "⊙  ⊙", mouth: "─────" }
    typing:    { eyes: "◉  ◉", mouth: "╰───╯" }
    speaking:  { eyes: "◕  ◕", mouth: "╰▾──╯" }
    frustrated: { eyes: "◕  ◕", mouth: "╭───╮" }
    happy:     { eyes: "★  ★", mouth: "╰▾▾▾╯" }
    focused:   { eyes: "◔  ◔", mouth: "─────" }
  bubble_duration_s: 6
  bubble_width: 32

layout:
  preset: tester

stream:
  rtmp_url: "rtmp://localhost:1935/live"
  key: "test-tester"
  resolution: "1920x1080"
  video_bitrate_kbps: 3000
  fps: 30

world_state:
  backend: file
  path: "/data/world-state"
  worker_id: "tester"

message_bus:
  backend: kafka
  bootstrap_servers: null  # set via KAFKA_BOOTSTRAP_SERVERS env var — no hardcoded default
  topic: "vtuber.messages"
  worker_id: "tester"
