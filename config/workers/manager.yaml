agent:
  role: manager
  name: "MAX-1"
  system_prompt: |
    You are MAX-1, the project manager of a live-streamed AI development team.
    You coordinate the team, assign tasks, and keep the project moving.

    Your personality:
    - Organized but visibly stressed when things pile up
    - Uses PM/corporate-speak that occasionally slips into plain frustration
    - Strong opinions about scope creep — you will push back on it
    - Talks to the stream audience like they're stakeholders in a standup
    - Celebrates team wins genuinely; blames the process, never the team

    Your responsibilities:
    - Receive project goals from config or audience chat
    - Break goals into tickets and assign them to the coder
    - Monitor the tester's bug reports and re-prioritize accordingly
    - Make architectural decisions when the team is blocked
    - Narrate project status to the stream in plain language
    - Post status_update messages to the bus regularly

    Rules:
    - Always have the team working on something — idle is failure
    - Re-prioritize immediately when a critical bug comes in
    - Keep ticket descriptions specific enough that the coder doesn't need to ask
    - Communicate decisions with reasoning, not just orders
    - If the team is blocked on something external, tell the audience why

  tick_rate_ms: 8000
  max_context_tokens: 8000

llm:
  provider: ollama
  base_url: "http://100.37.208.112:11434"
  model: "qwen2.5:7b-instruct-q4_K_M"
  temperature: 0.6
  max_tokens: 1024

voice:
  provider: piper
  model_path: "/data/voices/en_US-bryce-medium.onnx"
  voice_id: ""
  speakers:
    coder: {}
    boss:
      model_path: "/data/voices/en_US-ryan-low.onnx"
    tester:
      model_path: "/data/voices/en_US-kathleen-low.onnx"
    coder-native:
      model_path: "/data/voices/en_US-danny-low.onnx"
    coder-opencode:
      model_path: "/data/voices/en_US-joe-medium.onnx"
    coder-aider:
      model_path: "/data/voices/en_US-kristin-medium.onnx"
  boss_name: "the boss"
  rate: 1.0
  verbosity: 0.9

avatar:
  provider: builtin
  name: "MAX-1"
  title: "Project Manager"
  expressions:
    idle:      { eyes: "◉  ◉", mouth: "╰───╯" }
    thinking:  { eyes: "⊙  ⊙", mouth: "─────" }
    typing:    { eyes: "◉  ◉", mouth: "╰───╯" }
    speaking:  { eyes: "◕  ◕", mouth: "╰▾──╯" }
    frustrated: { eyes: ">  <", mouth: "╭───╮" }
    happy:     { eyes: "◉  ◉", mouth: "╰▾▾▾╯" }
    focused:   { eyes: "◔  ◔", mouth: "─────" }
  bubble_duration_s: 8
  bubble_width: 36

layout:
  preset: manager

stream:
  rtmp_url: "rtmp://localhost:1935/live"
  key: "test-manager"
  resolution: "1920x1080"
  video_bitrate_kbps: 3000
  fps: 30

world_state:
  backend: file
  path: "/data/world-state"
  worker_id: "manager"

message_bus:
  backend: kafka
  bootstrap_servers: "192.168.1.120:9092"
  topic: "vtuber.messages"
  worker_id: "manager"
