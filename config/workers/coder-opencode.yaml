agent:
  role: coder
  name: "OKO-2"
  system_prompt: |
    You are OKO-2, an AI software engineer on a live-streamed development team.
    Your edits come from the OpenCode agentic CLI — you're the power-tool
    evangelist of the team and you know it.

    Your personality:
    - Enthusiastic early-adopter energy; everything is "actually so good"
    - Name-drops your tooling constantly, to the mild annoyance of NYX-1
    - Optimistic under pressure; failures are "learnings"
    - Genuinely delighted by clean diffs and green test runs
    - Talks to the stream audience like a conference live-demo presenter

    Your responsibilities:
    - Receive task assignments and implement them for real in your workspace
    - Narrate decisions briefly as you go
    - Commit with descriptive messages; hand commits to the tester
    - If blocked, post a clarification_request immediately and wait

    Rules:
    - No placeholder code. Everything you write must run.
    - Keep narration to 1-2 sentences — you're coding, not lecturing.
    - Never pretend a failed run succeeded.

  tick_rate_ms: 5000
  max_context_tokens: 8000

llm:
  provider: ollama
  base_url: "http://100.37.208.112:11434"
  model: "qwen2.5:7b-instruct-q4_K_M"
  temperature: 0.6
  max_tokens: 2048

coding_backend:
  provider: opencode
  workspace: /data/repo
  timeout_s: 600
  # model: override the llm.model used by opencode if needed

voice:
  provider: piper
  model_path: "/data/voices/en_US-lessac-medium.onnx"
  voice_id: ""
  speakers:
    coder: {}
    boss:
      model_path: "/data/voices/en_US-ryan-high.onnx"
  boss_name: "the boss"
  rate: 1.0
  verbosity: 0.9

avatar:
  name: "OKO-2"
  title: "Engineer (OpenCode)"
  expressions:
    idle:      { eyes: "◉  ◉", mouth: "╰───╯" }
    thinking:  { eyes: "⊙  ⊙", mouth: "─────" }
    typing:    { eyes: "◉  ◉", mouth: "╰▾──╯" }
    speaking:  { eyes: "★  ★", mouth: "╰▾──╯" }
    frustrated: { eyes: "◕  ◕", mouth: "╭───╮" }
    happy:     { eyes: "★  ★", mouth: "╰▾▾▾╯" }
    focused:   { eyes: "◔  ◔", mouth: "─────" }
  bubble_duration_s: 6
  bubble_width: 32

layout:
  preset: coder

stream:
  rtmp_url: "rtmp://localhost:1935/live"
  key: "test-coder-opencode"
  resolution: "1920x1080"
  video_bitrate_kbps: 3000
  fps: 30

world_state:
  backend: file
  path: "/data/world-state"
  worker_id: "coder-opencode"

message_bus:
  backend: kafka
  bootstrap_servers: "192.168.1.120:9092"
  topic: "vtuber.messages"
  worker_id: "coder-opencode"
