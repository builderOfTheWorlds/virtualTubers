# ──────────────────────────────────────────────────────────────────────────────
# Layout preset: manager
#
# Composition preset for the MANAGER role. Same three-column geometry as `coder`
# (per a live-tuned tmux session's `window_layout`), but the editor/output pane
# shows a ticket-board style view instead of an editor (per the plan's note:
# coder->nvim, tester->pytest, manager->ticket board).
#
# ASSUMPTION: without a dedicated ticket-board tool wired in yet, this defaults
# to a simple watched view of the shared world-state tickets directory. Swap in a
# richer TUI (e.g. a curses ticket board) when one exists.
# ──────────────────────────────────────────────────────────────────────────────
preset: manager
panes:
  - use: editor                         # base pane, col1 (~33% wide)
    title: "Ticket Board"
    with: { variant: tickets }
    command: 'watch -n5 "cat /data/world-state/tickets/*.md 2>/dev/null || echo \"(no tickets yet)\""'

  - use: avatar                         # carves out columns 2+3 combined
    target: editor
    split: h
    size: 66

  - use: htop                           # carves col3 (htop+kafka_feed) off the block
    target: avatar
    split: h
    size: 50

  - use: kafka_feed                     # bottom of col3; remainder stays htop
    target: htop
    split: v
    size: 49

  - use: filetree                       # bottom of col2; remainder stays avatar
    target: avatar
    split: v
    size: 50                            # was 81 (avatar ~19% tall) — now even 50/50 split
