# ──────────────────────────────────────────────────────────────────────────────
# Layout preset: manager
#
# Composition preset for the MANAGER role. Same five-pane geometry as `coder`,
# but the editor/output pane shows a ticket-board style view instead of an editor
# (per the plan's note: coder->nvim, tester->pytest, manager->ticket board).
#
# ASSUMPTION: without a dedicated ticket-board tool wired in yet, this defaults
# to a simple watched view of the shared world-state tickets directory. Swap in a
# richer TUI (e.g. a curses ticket board) when one exists.
# ──────────────────────────────────────────────────────────────────────────────
preset: manager
panes:
  - use: filetree
    size: 25

  - use: editor
    target: filetree
    split: h
    size: 75
    title: "Ticket Board"
    with: { variant: tickets }
    command: 'watch -n5 "cat /data/world-state/tickets/*.md 2>/dev/null || echo (no tickets yet)"'

  - use: avatar
    target: filetree
    split: v
    size: 60

  - use: kafka_feed
    target: editor
    split: v
    size: 30

  - use: htop
    target: filetree
    split: v
    size: 15
