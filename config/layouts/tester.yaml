# ──────────────────────────────────────────────────────────────────────────────
# Layout preset: tester
#
# Composition preset for the TESTER role. Same five-pane geometry as `coder`,
# but the editor/output pane runs the test suite with coverage on a loop instead
# of an interactive editor (per the plan's note: coder->nvim, tester->pytest +
# coverage output, manager->ticket board).
#
# ASSUMPTION: the exact test command is a reasonable default; adjust to the
# project's real test entrypoint. It re-runs every 5s so the stream shows live
# results. Falls back to a message if pytest is unavailable.
# ──────────────────────────────────────────────────────────────────────────────
preset: tester
panes:
  - use: filetree
    size: 25

  - use: editor
    target: filetree
    split: h
    size: 75
    title: "Test Output"
    with: { variant: pytest }
    command: 'watch -n5 "cd /data/repo 2>/dev/null && pytest --cov -q 2>&1 | tail -40 || echo (no tests yet)"'

  - use: avatar
    target: filetree
    split: v
    size: 33

  - use: kafka_feed
    target: editor
    split: v
    size: 30

  - use: htop
    target: filetree
    split: v
    size: 50
