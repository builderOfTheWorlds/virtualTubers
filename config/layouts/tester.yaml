# ──────────────────────────────────────────────────────────────────────────────
# Layout preset: tester
#
# Composition preset for the TESTER role. Same three-column geometry as `coder`
# (per a live-tuned tmux session's `window_layout`), but the editor/output pane
# runs the test suite with coverage on a loop instead of an interactive editor
# (per the plan's note: coder->nvim, tester->pytest + coverage output,
# manager->ticket board).
#
# ASSUMPTION: the exact test command is a reasonable default; adjust to the
# project's real test entrypoint. It re-runs every 5s so the stream shows live
# results. Falls back to a message if pytest is unavailable.
# ──────────────────────────────────────────────────────────────────────────────
preset: tester
panes:
  - use: editor                         # base pane, col1 (~33% wide)
    title: "Test Output"
    with: { variant: pytest }
    command: 'watch -n5 "cd /data/repo 2>/dev/null && pytest --cov -q 2>&1 | tail -40 || echo \"(no tests yet)\""'

  - use: avatar                         # carves out columns 2+3 combined
    target: editor
    split: h
    size: 66

  - use: htop                           # carves col3 (htop+kafka_feed) off the block
    target: avatar
    split: h
    size: 50

  - use: kafka_feed                     # bottom of col3; remainder stays htop
    target: htop
    split: v
    size: 49

  - use: filetree                       # bottom of col2; remainder stays avatar
    target: avatar
    split: v
    size: 20                            # was 81, then 50 — avatar still only showed its
                                         # top half with the animated ascii_avatar face
                                         # (~20 content rows + bubble + status bar); avatar
                                         # now keeps ~80% of the column, filetree the rest
