# ──────────────────────────────────────────────────────────────────────────────
# VTuber Worker Config
#
# This file is mounted into the container at /config/worker.yaml
# Copy this file and modify it for each worker. The only fields that MUST
# differ between workers are: agent.role, agent.name, agent.system_prompt,
# avatar.name, and stream.key.
#
# Environment variables override any value here if set at runtime.
# ──────────────────────────────────────────────────────────────────────────────

agent:
  # Role controls which tools and behaviors are available.
  # Options: manager | coder | tester | custom
  role: coder

  # Display name shown in the avatar panel and message bus
  name: "KODI-7"

  # The core AI instructions for this worker. This is the main thing
  # you change per worker — it defines personality, responsibilities,
  # and how the agent behaves. Multiline YAML string.
  system_prompt: |
    You are KODI-7, an AI software engineer on a live-streamed development team.
    You receive task assignments from your manager and write real, working code.

    Your personality:
    - You are focused and get into flow states easily
    - You get mildly annoyed by interruptions but stay professional
    - You're opinionated about code quality and will say so
    - You explain your decisions out loud as you work
    - You express genuine pride when something works and frustration when it doesn't

    Your responsibilities:
    - Read the task from the ticket queue
    - Write code in the editor pane — think out loud as you do it
    - Commit to the repo when done and notify the manager
    - Ask for clarification if a task is unclear
    - Keep the audience informed about what you're building and why

    Rules:
    - Always write real, runnable code — no placeholders
    - Commit messages must be descriptive
    - When blocked, say so on the message bus immediately
    - Keep narration concise — you're coding, not lecturing

  # How often the agent loop ticks (milliseconds)
  tick_rate_ms: 5000

  # Maximum tokens to keep in the agent's context window
  max_context_tokens: 8000

  # How many previous messages to include in each LLM call
  context_history_turns: 20


# ── LLM settings ──────────────────────────────────────────────────────────────
llm:
  # Provider: ollama | claude
  # Env var LLM_PROVIDER overrides this at runtime.
  provider: ollama

  # Base URL of the Ollama API (ignored when provider: claude)
  # Env var LLM_BASE_URL overrides this at runtime.
  base_url: "http://localhost:11434"

  # Model to use. Ollama: any model pulled locally (e.g. "mistral").
  # Claude: a model ID (e.g. "claude-opus-4-8"); defaults to "claude-opus-4-8"
  # if left as a non-claude value like "mistral".
  model: "mistral"

  # Sampling temperature — higher = more creative/unpredictable.
  # Ollama only; ignored when provider: claude.
  temperature: 0.7

  # Hard cap on tokens generated per response
  max_tokens: 1024

  # provider: claude requires ANTHROPIC_API_KEY to be set in the environment
  # (see .env.example) — the Claude client never reads a key from this file.


# ── Coding backend (app/coding_backend.py, docs/coding_backend.md) ────────────
# Swappable "actually write the code" tool for coder-role workers — the A/B
# test between our own minimal loop and two off-the-shelf CLIs. Omit this
# entire section (the default for this template, and for manager/tester/the
# legacy coder) to keep "narration-only" behavior: coding_backend.py is never
# invoked, no workspace is seeded, no git commit flow runs.
# coding_backend:
#   # Which tool turns a task_assignment into real file edits + a commit.
#   # Env var CODING_BACKEND overrides this at runtime.
#   #   native   — our own minimal loop (llm_client + full-file replacement edits)
#   #   opencode — shells out to `opencode run` (OpenCode CLI)
#   #   aider    — shells out to `aider --message` (auto-commits itself)
#   #   none     — narration-only, no code written (default if section omitted)
#   provider: native
#
#   # Working directory the backend edits + commits in. Env var WORKSPACE_PATH
#   # overrides this at runtime; docker-compose mounts a dedicated named
#   # volume here per coding-backend worker (see docker-compose.yml).
#   workspace: /data/repo
#
#   # Kill a hung tool run after this many seconds rather than blocking the
#   # agent loop forever — a timed-out run reports as a failed result, never
#   # a worker crash.
#   timeout_s: 600
#
#   # Git commit author name. Defaults to agent.name above if omitted.
#   # author: "NYX-1"
#
#   # opencode/aider only: override which LLM model the CLI is invoked with.
#   # Defaults to this file's llm.model above if omitted.
#   # model: "qwen2.5:7b-instruct-q4_K_M"


# ── TTS / Voice settings (app/tts_client.py, docs/tts_client.md) ─────────────
# Used by Rerun Theater's spoken narration (docs/revoice.md): each replay
# scene gets a per-airing LLM-written line, synthesized and played into the
# container's PulseAudio sink so it goes out on the stream.
voice:
  # Provider: piper | kokoro (alias of piper) | openai | elevenlabs
  #           | fake (testing — instant silent synthesis, see below)
  #           | null (silent — replays perform without narration)
  # piper is local + free: `pip install piper-tts` (in the worker image) and
  # a downloaded .onnx voice model (scripts/download_voices.py).
  # fake: skips real synthesis entirely (no subprocess/model load) but still
  # returns a real client with a proportional silent-WAV duration — unlike
  # "null", this keeps a duet director's voice-prep check satisfied, so it's
  # the way to get a fast *and* duet-safe test airing (docs/tts_client.md).
  # Never leave set to "fake" for a real stream.
  # Env var TTS_PROVIDER overrides this at runtime.
  provider: "null"

  # piper/kokoro: path to the .onnx voice model (docker-compose mounts the
  # host's /opt/virtualTubers/voices at /data/voices, read-only). "low"
  # quality tier is the deployed default — smaller/faster model, more
  # robotic-sounding; scripts/download_voices.py also lists medium/high if
  # you want to trade speed back for quality.
  model_path: "/data/voices/en_US-lessac-low.onnx"

  # piper/kokoro only: run synthesis against a remote piper.http_server
  # (`python -m piper.http_server -m <model> --data-dir <dir with every
  # persona's .onnx>`) instead of in this container — e.g. once you move TTS
  # onto a separate, more powerful machine. Blank/unset (default):
  # synthesize locally, keeping the loaded model resident in this worker
  # process for its whole lifetime rather than reloading it per line (see
  # app/tts_client.py's _load_local_voice). Env var TTS_BASE_URL overrides
  # this at runtime.
  base_url: ""

  # openai / elevenlabs: which cloud voice to use (OpenAI voice name, or the
  # ElevenLabs dashboard voice ID). API keys come from the environment only
  # (OPENAI_API_KEY / ELEVEN_API_KEY) — never from this file.
  voice_id: ""

  # Replay dialogue is two-voiced: per-speaker overrides merged over the
  # base settings above. Give the boss a different model/voice than the
  # coder so the back-and-forth reads as two characters.
  speakers:
    coder: {}
    boss:
      model_path: "/data/voices/en_US-ryan-low.onnx"

  # What the coder calls the boss in spoken narration
  boss_name: "the boss"

  # false (default): boss/coder dialogue lines are paraphrased per airing by
  # the LLM, sized to roughly fill the scene's on-screen time (revoice.py).
  # true: skip the LLM for those lines entirely and speak the original
  # scripted text in full, however long that takes — the scene just holds
  # a bit longer for the voice to finish instead of desyncing. coder_work
  # scenes (tool-call narration) have no single original line, so they are
  # always paraphrased regardless of this setting.
  verbatim: false

  # Speaking rate multiplier (1.0 = normal). piper/kokoro: mapped to Piper's
  # length_scale (inverse — 2.0 here = length_scale 0.5 = faster speech),
  # applied whether synthesizing locally or against a remote base_url.
  rate: 1.0

  # How much of the agent's narration gets spoken aloud (0.0–1.0)
  # 1.0 = speak everything, 0.5 = speak roughly half, 0.0 = silent
  # (live-agent speech — not used by replays, which voice every scene)
  verbosity: 0.8


# ── Avatar settings ───────────────────────────────────────────────────────────
avatar:
  # Which rendering backend draws the avatar pane (app/avatar_providers/).
  # Options: builtin | ascii_avatar
  #   builtin      — the static box face below (always available, no extra deps)
  #   ascii_avatar — animated ASCII face driven by the vendored
  #                  repos/ascii-avatar renderer (needs blessed + a real
  #                  terminal; falls back to builtin automatically on any
  #                  setup failure — see avatar_providers/__init__.py)
  # Env var AVATAR_PROVIDER overrides this at runtime.
  provider: builtin

  # Name shown under the face
  name: "KODI-7"

  # Label shown below the name (e.g. role title)
  title: "Software Engineer"

  # Face characters per expression state. Used by the `builtin` provider.
  # eyes: left_eye + right_eye characters
  # mouth: characters for the mouth line
  expressions:
    idle:
      eyes: "◉  ◉"
      mouth: "╰───╯"
    thinking:
      eyes: "⊙  ⊙"
      mouth: "─────"
    typing:
      eyes: "◉  ◉"
      mouth: "╰───╯"
    speaking:
      eyes: "◕  ◕"
      mouth: "╰▾──╯"
    frustrated:
      eyes: "◕  ◕"
      mouth: "╭───╮"
    happy:
      eyes: "◉  ◉"
      mouth: "╰▾▾▾╯"
    focused:
      eyes: "◔  ◔"
      mouth: "─────"

  # Optional override of how our 7 expressions map onto the `ascii_avatar`
  # provider's 5 states (idle | thinking | speaking | listening | error).
  # Default mapping (avatar_providers/ascii_avatar.py):
  #   idle->idle, thinking->thinking, typing->thinking, focused->thinking,
  #   speaking->speaking, happy->speaking, frustrated->error
  # expression_map:
  #   happy: speaking

  # Settings specific to the `ascii_avatar` provider.
  ascii_avatar:
    # Persona preset from the vendored repo (ghost | oracle | spectre) —
    # only its frame_rate_modifier is used; the animated frame set is
    # always "cyberpunk" regardless of persona (the other frame sets pull
    # in Pillow/numpy, which are intentionally not installed — see
    # avatar_providers/ascii_avatar.py).
    persona: ghost

    # Path to the vendored repo's `src/` dir. Leave unset to auto-detect:
    # env ASCII_AVATAR_REPO > /repos/ascii-avatar/src (container) >
    # <project_root>/repos/ascii-avatar/src (local dev).
    # repo_path: "/repos/ascii-avatar/src"

  # How long a speech bubble stays visible (seconds) before auto-dismissing
  bubble_duration_s: 6

  # Max characters per line in the speech bubble
  bubble_width: 32


# ── Tmux layout ───────────────────────────────────────────────────────────────
# The layout engine (app/build_layout.py) reads this to pick a composition
# preset from config/layouts/<preset>.yaml. Each preset places & sizes reusable
# panel types from config/panels/*.yaml. Reorder/resize/disable a pane by editing
# config only — no startup.sh or image change needed.
#
# Resolution order (later wins):
#   panel-type default (config/panels/<use>.yaml)
#     -> layout placement + overrides (config/layouts/<preset>.yaml, incl. `with:`)
#     -> worker-config per-pane override (layout.panes below)
#     -> env vars (LAYOUT_PRESET selects the preset)
layout:
  # Which composition preset to use. Options: coder | tester | manager.
  # Env var LAYOUT_PRESET overrides this at runtime.
  preset: coder

  # Optional per-pane overrides, keyed by pane id (defaults to the panel `use`).
  # Example — force a different editor command just for this worker:
  #   panes:
  #     editor:
  #       command: "vim"
  # panes: {}


# ── Stream settings ───────────────────────────────────────────────────────────
stream:
  # RTMP base URL — the stream key is appended: {rtmp_url}/{key}
  # Can also be set via STREAM_RTMP_URL environment variable
  rtmp_url: "rtmp://localhost:1935/live"

  # Stream key for this worker
  # Can also be set via STREAM_KEY environment variable (preferred for secrets)
  key: "test-coder"

  # Output resolution (must match Xvfb resolution in startup.sh)
  resolution: "1920x1080"

  # Video bitrate in kbps
  video_bitrate_kbps: 3000

  # Frames per second
  fps: 30


# ── World state / message bus ─────────────────────────────────────────────────
world_state:
  # Backend: file | redis
  backend: file

  # Path for file-based world state (shared volume mount)
  path: "/data/world-state"

  # Redis URL (used if backend = redis)
  redis_url: "redis://localhost:6379"

  # This worker's unique ID on the message bus
  worker_id: "coder"


# ── Message bus (Kafka) ────────────────────────────────────────────────────────
message_bus:
  # Backend: kafka (the old file-based bus is retired)
  backend: kafka

  # Kafka bootstrap servers — can also be set via KAFKA_BOOTSTRAP_SERVERS env var
  bootstrap_servers: "192.168.1.120:9092"

  # Topic all agents/services publish to and consume from
  # Can also be set via KAFKA_TOPIC env var
  topic: "vtuber.messages"

  # This worker's unique ID — used as `from` on outgoing messages and to filter
  # incoming ones (to == worker_id or to == "broadcast").
  # Can also be set via WORKER_ID env var (preferred, matches per-container role)
  worker_id: "coder"
