# Scope collection to the project's own suite. sandbox/ is the agents'
# workspace template and ships with a deliberately failing test (seeded bug)
# — a bare `pytest` at repo root must not pick it up.
[pytest]
testpaths = tests
markers =
    unit: fast, fully-mocked tests
    integration: tests touching real local resources (git, subprocesses)
    slow: tests that spawn real subprocesses (e.g. nested pytest runs)
